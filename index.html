<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoanFit</title>

    <style>

            padding:0;

        body{

            display:flex;

            align-items:center;
            height:100vh;
        }

        .card{

            padding:50px;
            border-radius:15px;
            box-shadow:0 10px 25px rgba(0,0,0,.1);

        }

        h1{
            color:#1565C0;
            font-size:48px;
            margin-bottom:20px;
        }

        p{
            font-size:20px;
            color:#555;
            margin-bottom:15px;
        }

        .coming{
            margin-top:30px;
            color:#2E7D32;
            font-size:28px;
            font-weight:bold;
        }

        footer{
            margin-top:40px;
            color:gray;
            font-size:14px;
        }

</head>

<div class="card">

<h1>LoanFit</h1>

<p>
Know your loan eligibility before applying.
</p>

<p>

</p>

<div class="coming">

</html>
